#@ load("_ytt.lib.yaml", "labels")

{{{- if .environment.network_policy_enabled }}}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vector
  namespace: vector
  labels: #@ labels()
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vector
      app.kubernetes.io/instance: vector
      app.kubernetes.io/component: Agent
  ingress:
  - from: #! allow access for prometheus
    - namespaceSelector:
        matchLabels:
          namespace.kubernetes.io/name: prometheus
      podSelector: {}
    ports:
    - port: 9090
{{{ end }}}
