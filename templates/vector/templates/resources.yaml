#@ load("@ytt:data", "data")
#@ load("@ytt:overlay", "overlay")

#@overlay/match by=overlay.subset({"kind":"DaemonSet", "metadata":{"name":"vector"}}), expects=1
---
spec:
  template:
    spec:
      containers:
      #@overlay/match by=overlay.subset({"name":"vector"}), expects=1
      - name: vector
        #@overlay/replace
        resources: #@ data.values.vector.resources
