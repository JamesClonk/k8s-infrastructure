#@ load("@ytt:data", "data")
#@ load("_ytt.lib.yaml", "labels")

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres
  namespace: postgres
  labels: #@ labels("secret")
  annotations:
    kapp.k14s.io/versioned: ""
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: {{{ .postgres.password }}}
  PGDATA: /var/lib/postgresql/data/pgdata
  DB_HOST: "127.0.0.1"
  DB_PORT: "6432"
  DB_USER: postgres
  DB_PASSWORD: {{{ .postgres.password }}}

---
apiVersion: v1
kind: Secret
metadata:
  name: pgbackup
  namespace: postgres
  labels: #@ labels("secret")
  annotations:
    kapp.k14s.io/versioned: ""
type: Opaque
stringData:
  PGHOST: postgres.postgres.svc.cluster.local
  PGPORT: "5432"
  PGUSER: postgres
  PGPASSWORD: {{{ .postgres.password }}}
  PGDUMPPATH: /data/pgbackup
  FILE_RETENTION: {{{ .postgres.backup.s3.file_retention }}}
  S3_ACCESS_KEY: "{{{ .postgres.backup.s3.access_key_id }}}"
  S3_SECRET_KEY: "{{{ .postgres.backup.s3.secret_access_key }}}"
  S3_ENDPOINT: "{{{ .postgres.backup.s3.endpoint }}}"
  S3_BUCKET: "{{{ .postgres.backup.s3.bucket }}}"
  S3_RETENTION: "{{{ .postgres.backup.s3.retention_days }}}"
  S3_UPLOAD_ENABLED: "{{{ .postgres.backup.s3.enabled }}}"
