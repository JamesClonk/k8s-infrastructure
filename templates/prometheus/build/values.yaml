forceNamespace: prometheus

server:
  baseURL: "https://prometheus.{{{ .environment.domain }}}"
  ingress:
    enabled: false

  strategy:
    type: Recreate

  persistentVolume:
    enabled: true
    size: 10Gi
  emptyDir:
    sizeLimit: 10Gi
  retention: "7d"
  retentionSize: "8GB"

  replicaCount: 1

  statefulSet:
    enabled: false
  daemonSet:
    enabled: false

  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi

serverFiles:
  alerting_rules.yml: {}

alertmanager:
  enabled: true
  configFromSecret: "prometheus-alertmanager"
  ingress:
    enabled: false
  persistence:
    enabled: false
    size: 1Gi
  emptyDir:
    sizeLimit: 1Gi
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 10m
      memory: 32Mi

kube-state-metrics:
  enabled: true
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 10m
      memory: 32Mi

prometheus-node-exporter:
  enabled: true
  resources:
    limits:
      cpu: 200m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi

prometheus-pushgateway:
  enabled: false

scrapeConfigs:
  kubernetes-api-servers:
    kubernetes_sd_configs:
      - role: endpointslice
    relabel_configs:
      - source_labels:
        - __meta_kubernetes_namespace
        - __meta_kubernetes_service_name
        - __meta_kubernetes_endpointslice_port_name
        action: keep
        regex: default;kubernetes;https
  kubernetes-service-endpoints:
    kubernetes_sd_configs:
      - role: endpointslice
  kubernetes-service-endpoints-slow:
    kubernetes_sd_configs:
      - role: endpointslice
