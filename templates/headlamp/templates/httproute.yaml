#@ load("@ytt:data", "data")

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headlamp
  namespace: headlamp
  labels:
    k8s-app: headlamp
spec:
  parentRefs:
  - name: envoy-gateway
    namespace: envoy-gateway-system
    sectionName: dashboard
  hostnames:
  - dashboard.{{{ .environment.domain }}}
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: headlamp
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        set:
        - name: Strict-Transport-Security
          value: "max-age=31536000; includeSubDomains"

---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: headlamp
  namespace: headlamp
  labels:
    k8s-app: headlamp
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: headlamp
  oidc:
    provider:
      issuer: https://dex.{{{ .environment.domain }}}/dex
    clientID: envoy-gateway
    clientSecret:
      name: headlamp-oidc-client-secret
    redirectURL: https://dashboard.{{{ .environment.domain }}}/oauth2/callback
    logoutPath: /logout

---
apiVersion: v1
kind: Secret
metadata:
  name: headlamp-oidc-client-secret
  namespace: headlamp
  labels:
    k8s-app: headlamp
type: Opaque
stringData:
  client-secret: {{{ .dex.oidc_client_secret }}}
