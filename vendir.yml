---
apiVersion: vendir.k14s.io/v1alpha1
kind: Config
minimumRequiredVersion: 0.12.0

directories:
- path: vendor/github.com/envoyproxy/gateway
  contents:
  - path: .
    githubRelease:
      slug: envoyproxy/gateway
      tag: v1.7.0
      assetNames: ["install.yaml", "envoy-gateway-crds.yaml"]
      disableAutoChecksumValidation: true
- path: templates/envoy-gateway/templates/upstream
  contents:
  - path: .
    directory:
      path: vendor/github.com/envoyproxy/gateway
    includePaths:
    - install.yaml
    ignorePaths:
    - LICENSE
    - NOTICE
    - envoy-gateway-crds.yaml
    excludePaths:
    - LICENSE
    - NOTICE
    - envoy-gateway-crds.yaml

- path: vendor/github.com/dexidp/helm-charts
  contents:
  - path: .
    git:
      url: https://github.com/dexidp/helm-charts
      ref: dex-0.24.0
    includePaths:
    - charts/dex/**/*
- path: templates/dex/build/chart
  contents:
  - path: .
    directory:
      path: vendor/github.com/dexidp/helm-charts/charts/dex
    ignorePaths:
    - LICENSE
    - NOTICE
    excludePaths:
    - LICENSE
    - NOTICE

- path: vendor/github.com/jetstack/cert-manager
  contents:
  - path: .
    githubRelease:
      slug: jetstack/cert-manager
      tag: v1.19.4
      disableAutoChecksumValidation: true
    includePaths:
    - cert-manager.yaml
- path: templates/cert-manager/templates/upstream
  contents:
  - path: .
    directory:
      path: vendor/github.com/jetstack/cert-manager
    includePaths:
    - cert-manager.yaml
    ignorePaths:
    - LICENSE
    - NOTICE
    excludePaths:
    - LICENSE
    - NOTICE

- path: vendor/github.com/kubernetes-sigs/headlamp
  contents:
  - path: .
    git:
      url: https://github.com/kubernetes-sigs/headlamp
      ref: headlamp-helm-0.40.0
    includePaths:
    - charts/headlamp/**/*
- path: templates/headlamp/build/chart
  contents:
  - path: .
    directory:
      path: vendor/github.com/kubernetes-sigs/headlamp/charts/headlamp
    ignorePaths:
    - LICENSE
    - NOTICE
    excludePaths:
    - LICENSE
    - NOTICE

- path: vendor/github.com/prometheus-community/helm-charts
  contents:
  - path: .
    git:
      url: https://github.com/prometheus-community/helm-charts
      ref: prometheus-28.13.0
    includePaths:
    - charts/prometheus/**/*
- path: templates/prometheus/build/chart
  contents:
  - path: .
    directory:
      path: vendor/github.com/prometheus-community/helm-charts/charts/prometheus
    ignorePaths:
    - LICENSE
    - NOTICE
    excludePaths:
    - LICENSE
    - NOTICE

- path: vendor/github.com/grafana/grafana
  contents:
  - path: .
    git:
      url: https://github.com/grafana-community/helm-charts
      ref: grafana-11.3.2
    includePaths:
    - charts/grafana/**/*
- path: templates/grafana/build/chart
  contents:
  - path: .
    directory:
      path: vendor/github.com/grafana/grafana/charts/grafana
    ignorePaths:
    - LICENSE
    - NOTICE
    excludePaths:
    - LICENSE
    - NOTICE

- path: vendor/github.com/grafana/loki
  contents:
  - path: .
    git:
      url: https://github.com/grafana/loki
      ref: helm-loki-6.54.0
    includePaths:
    - production/helm/loki/**/*
- path: templates/loki/build/chart
  contents:
  - path: .
    directory:
      path: vendor/github.com/grafana/loki/production/helm/loki
    ignorePaths:
    - LICENSE
    - NOTICE
    excludePaths:
    - LICENSE
    - NOTICE

- path: vendor/github.com/vectordotdev/helm-charts
  contents:
  - path: .
    git:
      url: https://github.com/vectordotdev/helm-charts
      ref: vector-0.51.0
    includePaths:
    - charts/vector/**/*
- path: templates/vector/build/chart
  contents:
  - path: .
    directory:
      path: vendor/github.com/vectordotdev/helm-charts/charts/vector
    ignorePaths:
    - LICENSE
    - NOTICE
    excludePaths:
    - LICENSE
    - NOTICE
