---
apiVersion: vendir.k14s.io/v1alpha1
kind: Config
minimumRequiredVersion: 0.12.0

directories:
- path: vendor/github.com/envoyproxy/gateway
  contents:
  - path: .
    githubRelease:
      slug: envoyproxy/gateway
      tag: v1.7.0
      assetNames: ["install.yaml", "envoy-gateway-crds.yaml"]
      disableAutoChecksumValidation: true
- path: envoy-gateway/templates/upstream
  contents:
  - path: .
    directory:
      path: vendor/github.com/envoyproxy/gateway
    includePaths:
    - install.yaml
    ignorePaths:
    - LICENSE
    - NOTICE
    - envoy-gateway-crds.yaml
    excludePaths:
    - LICENSE
    - NOTICE
    - envoy-gateway-crds.yaml

- path: vendor/github.com/oauth2-proxy/manifests
  contents:
  - path: .
    git:
      url: https://github.com/oauth2-proxy/manifests
      ref: oauth2-proxy-9.0.1
    includePaths:
    - helm/oauth2-proxy/**/*
- path: oauth2-proxy/build/chart
  contents:
  - path: .
    directory:
      path: vendor/github.com/oauth2-proxy/manifests/helm/oauth2-proxy
    ignorePaths:
    - LICENSE
    - NOTICE
    excludePaths:
    - LICENSE
    - NOTICE

- path: vendor/github.com/jetstack/cert-manager
  contents:
  - path: .
    githubRelease:
      slug: jetstack/cert-manager
      tag: v1.19.4
      disableAutoChecksumValidation: true
    includePaths:
    - cert-manager.yaml
- path: cert-manager/templates/upstream
  contents:
  - path: .
    directory:
      path: vendor/github.com/jetstack/cert-manager
    includePaths:
    - cert-manager.yaml
    ignorePaths:
    - LICENSE
    - NOTICE
    excludePaths:
    - LICENSE
    - NOTICE

- path: vendor/github.com/kubernetes-sigs/headlamp
  contents:
  - path: .
    git:
      url: https://github.com/kubernetes-sigs/headlamp
      ref: v0.40.1
    includePaths:
    - kubernetes-headlamp.yaml
- path: headlamp/templates/upstream
  contents:
  - path: .
    directory:
      path: vendor/github.com/kubernetes-sigs/headlamp
    includePaths:
    - kubernetes-headlamp.yaml
    ignorePaths:
    - LICENSE
    - NOTICE
    excludePaths:
    - LICENSE
    - NOTICE

- path: vendor/github.com/kubernetes/kube-state-metrics
  contents:
  - path: .
    git:
      url: https://github.com/kubernetes/kube-state-metrics
      ref: v2.6.0
    includePaths:
    - examples/standard/*
- path: monitoring/kube-state-metrics/templates/upstream
  contents:
  - path: .
    directory:
      path: vendor/github.com/kubernetes/kube-state-metrics/examples/standard
    ignorePaths:
    - LICENSE
    - NOTICE
    excludePaths:
    - LICENSE
    - NOTICE

- path: vendor/github.com/prometheus-community/helm-charts
  contents:
  - path: .
    git:
      url: https://github.com/prometheus-community/helm-charts
      ref: prometheus-15.16.1
    includePaths:
    - charts/prometheus/**/*
- path: monitoring/prometheus/build/chart
  contents:
  - path: .
    directory:
      path: vendor/github.com/prometheus-community/helm-charts/charts/prometheus
    ignorePaths:
    - LICENSE
    - NOTICE
    excludePaths:
    - LICENSE
    - NOTICE

- path: vendor/github.com/grafana/grafana
  contents:
  - path: .
    git:
      url: https://github.com/grafana/helm-charts
      ref: grafana-6.42.2
    includePaths:
    - charts/grafana/**/*
- path: monitoring/grafana/build/chart
  contents:
  - path: .
    directory:
      path: vendor/github.com/grafana/grafana/charts/grafana
    ignorePaths:
    - LICENSE
    - NOTICE
    excludePaths:
    - LICENSE
    - NOTICE

- path: vendor/github.com/grafana/promtail
  contents:
  - path: .
    git:
      url: https://github.com/grafana/helm-charts
      ref: promtail-6.5.1
    includePaths:
    - charts/promtail/**/*
- path: monitoring/loki/build/charts/promtail
  contents:
  - path: .
    directory:
      path: vendor/github.com/grafana/promtail/charts/promtail
    ignorePaths:
    - LICENSE
    - NOTICE
    excludePaths:
    - LICENSE
    - NOTICE

- path: vendor/github.com/grafana/loki
  contents:
  - path: .
    git:
      url: https://github.com/grafana/helm-charts
      ref: loki-2.16.0
    includePaths:
    - charts/loki/**/*
- path: monitoring/loki/build/charts/loki
  contents:
  - path: .
    directory:
      path: vendor/github.com/grafana/loki/charts/loki
    ignorePaths:
    - LICENSE
    - NOTICE
    excludePaths:
    - LICENSE
    - NOTICE
