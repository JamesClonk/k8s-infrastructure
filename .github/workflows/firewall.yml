name: configure firewall

on:
  workflow_dispatch:

env:
  SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

defaults:
  run:
    shell: bash
    working-directory: ./rendered

jobs:
  firewall:
    name: firewall
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: install wireguard tools
      run: ../github_wireguard.sh
    - name: install plato and render repo
      run: ../github_render.sh
    - name: setup
      if: ${{ always() }}
      run: ./setup.sh
    - name: configure firewall
      run: task hetzner:firewall
    - name: cleanup
      if: ${{ always() }}
      run: task cleanup
