#@ load("@ytt:data", "data")
#@ load("@ytt:assert", "assert")

#@ if len(data.values.configuration.ingress.domains) == 0 or len(data.values.configuration.ingress.domains[0]) == 0 or data.values.configuration.ingress.domains[0] == "example.org":
#@  assert.fail("domain is missing or invalid")
#@ end
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headlamp
  namespace: headlamp
  labels:
    k8s-app: headlamp
spec:
  parentRefs:
  - name: envoy-gateway
    namespace: envoy-gateway-system
    sectionName: dashboard
  hostnames:
  #@ for/end host in data.values.configuration.ingress.domains:
  - #@ "dashboard." + host
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: headlamp
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /

---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: headlamp
  namespace: headlamp
  labels:
    k8s-app: headlamp
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: headlamp
  oidc:
    provider:
      issuer: https://dex.jamesclonk.com/dex # TODO: template via plato!!!
    clientID: envoy-gateway
    clientSecret:
      name: headlamp-oidc-client-secret
    redirectURL: https://dashboard.jamesclonk.com/oauth2/callback # TODO: template via plato!!!
    logoutPath: /logout

---
apiVersion: v1
kind: Secret
metadata:
  name: headlamp-oidc-client-secret
  namespace: headlamp
  labels:
    k8s-app: headlamp
type: Opaque
stringData:
  client-secret: 9589171b-b701-4237-bab1-ec43e97bb2d8 # TODO: template via plato!!!
