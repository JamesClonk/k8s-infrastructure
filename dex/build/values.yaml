ingress:
  enabled: false

env:
  name: TZ
  value: Europe/Zurich

volumes:
- name: custom-theme
  configMap:
    name: dex-custom-theme

volumeMounts:
- name: custom-theme
  mountPath: /srv/dex/web/themes/custom

config:
  issuer: https://dex.jamesclonk.com/dex # TODO: template via plato!!!

